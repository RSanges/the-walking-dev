name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install (core + dev deps, no GPU/TTS)
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check walkingdev scripts tests

      - name: Test (pytest)
        run: uv run pytest -q
